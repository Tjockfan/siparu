# CI has two layers:
#  1. plugin-ci - Signal K's official reusable workflow: Linux x64/arm64, macOS,
#     Windows (Node 20+22) plus an armv7/Venus OS run under QEMU. It verifies the
#     package layout, entry point, schema, lifecycle, API usage, npm-pack integrity
#     and the --ignore-scripts AppStore install.
#  2. guards - the product's non-negotiables: the read-only proof, GET-only REST,
#     the map-stack licence gate, and no value imports from devDependencies.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  plugin-ci:
    # Pinned to a commit SHA (supply chain). To update:
    # gh api repos/SignalK/signalk-server/commits/master --jq .sha
    uses: SignalK/signalk-server/.github/workflows/plugin-ci.yml@1806425cc9389e3de85c78609397043e67ea0f1d
    with:
      node-versions: '["20", "22"]'
      build-command: 'npm run ci:build'
      test-command: 'npm test'

  guards:
    name: Product guards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Read-only proof - the plugin never writes to the boat
        run: |
          # The vessel-write surface of @signalk/server-api, in full. This is the
          # promise the README makes, and it is the one that has to hold.
          ! grep -rnE "handleMessage|nmea2000out|nmea0183out|registerPutHandler|registerActionHandler|registerDeltaInputHandler|emitPropertyValue|putSelfPath" plugin/src

      - name: Read-only proof - no write method leaves the plugin
        run: |
          # The step above watches the door the server-api opens. It is not the only
          # door: the boat's Signal K answers HTTP on the same host this plugin runs
          # on, so `fetch(url, { method: 'PUT' })` writes to the vessel without
          # naming a single symbol that step greps for. The webapp has been held to
          # this check since the beginning; the plugin never was.
          #
          # PUT is how Signal K takes a write, so the plugin has no use for it, nor
          # for PATCH or DELETE. POST is left out on purpose and is not an oversight:
          # pairing and telemetry are POSTs, and the step below is what holds them to
          # the relay's address rather than the boat's.
          #
          # Case-insensitive because fetch() uppercases the method for us, so a
          # lowercase 'put' is the same request with a lowercase spelling.
          #
          # What this and the step below can and cannot do, since a guard nobody can
          # see the edge of gets trusted past it: between them they read the verb and
          # the address, and a write needs both, so defeating them takes hiding both
          # at once. That is not a line anybody writes by accident, and accident is
          # the whole threat here - anyone who can edit plugin/src can edit this file
          # too. These steps are how we catch ourselves, not how we stop an attacker.
          offenders=$(grep -rniE "method: *['\"]?(PUT|PATCH|DELETE)" plugin/src) || true
          [ -z "$offenders" ] || { echo "$offenders"; exit 1; }

      - name: Read-only proof - the plugin never addresses the vessel's own API
        run: |
          # A write has to be aimed at the boat, and the boat's REST lives under
          # /signalk/v1|v2/api on the loopback this plugin shares with her. Naming
          # that address is the one thing every write to the vessel has in common,
          # whatever verb it eventually uses, so nothing here may name it. The relay
          # is reached through config's relayUrl and lives on the public internet.
          offenders=$(grep -rniE "/signalk/v[0-9]+/api|localhost:[0-9]+|127\.0\.0\.1|\[::1\]" plugin/src) || true
          [ -z "$offenders" ] || { echo "$offenders"; exit 1; }

      - name: GET-only REST - pairing is the only exception, and it is named
        run: |
          # rest.ts stays GET-only. The four pairing routes move the plugin's own
          # state - a code, an approval, a token - and call the relay outbound; the
          # step above proves, independently, that none of it reaches the vessel.
          # A fifth write route breaks this build on purpose: it needs a human.
          offenders=$(grep -rnE "router\.(post|put|delete|patch)\(" plugin/src \
            | grep -vE "router\.post\('/pair/(start|approve|deny|reset)'") || true
          [ -z "$offenders" ] || { echo "$offenders"; exit 1; }

      - name: Read-only proof - the webapp writes only to the pairing routes
        run: |
          # ui/src is the shared design system the webapp bundles; it is held to
          # the same rule as the webapp source it was extracted from.
          offenders=$(grep -rnE "method: *['\"]?(PUT|POST|DELETE|PATCH)" webapp/src ui/src \
            | grep -vE "'/pair/(start|approve|deny|reset)'") || true
          [ -z "$offenders" ] || { echo "$offenders"; exit 1; }

      - name: PWA shell - the static assets index.html names are in the clean checkout
        run: |
          # The favicon and manifest were once ignored by a bare `public/` line in
          # .gitignore: they lived on the maintainer's disk and a fresh clone built
          # without them. Publishing worked only by luck. This asserts that every
          # static asset the entry HTML references (the ./-relative ones Vite copies
          # from public/, not the /src module entry) is actually tracked, so a clone -
          # and therefore the package - carries it.
          missing=0
          for asset in $(grep -oE '(href|src)="\./[^"]+"' webapp/index.html | sed -E 's/.*"\.\/([^"]+)"/\1/'); do
            if [ ! -f "webapp/public/$asset" ]; then
              echo "index.html references ./$asset but webapp/public/$asset is not in the checkout"
              missing=1
            fi
          done
          [ "$missing" -eq 0 ]

      - name: License gate - no Leaflet/CARTO/OpenSeaMap remnants
        run: |
          ! grep -rin "leaflet\|cartocdn\|openseamap" plugin/src webapp/src ui/src

      - name: Runtime purity - no value imports from devDependencies
        run: |
          ! grep -rn "from '@signalk/server-api'\|from 'express'" plugin/src | grep -v "import type"
